<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrackIt | Live Test Portal</title>
    
    <!-- External Dependencies -->
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>

    <style>
        :root { 
            --primary: #3a86ff; 
            --success: #2ecc71; 
            --danger: #e74c3c; 
            --warning: #ffbe0b; 
            --bg: #f4f7f9; 
            --card-bg: #ffffff; 
            --text-main: #000000;
            --text-muted: #636e72;
            --border: #dfe6e9; 
            --header-blue: #0056b3;
            --table-text: #0984e3;
        }
        [data-theme="dark"] { 
            --bg: #121212; 
            --card-bg: #1e1e1e; 
            --text-main: #f5f6fa; 
            --border: #333333; 
            --primary: #6ab0ff;
            --table-text: #74b9ff;
        }

        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; user-select: none; transition: 0.3s; overflow-x: hidden; }
        
        .top-bar { background: var(--card-bg); padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .container { max-width: 1400px; margin: 20px auto; padding: 0 15px; display: flex; gap: 20px; }
        
        /* --- Main Exam Area --- */
        .exam-window { flex: 1; width: 100%; }
        .question-area { background: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-height: 450px; }
        
        #timer { font-weight: bold; color: #fff; background: var(--danger); padding: 8px 18px; border-radius: 5px; font-variant-numeric: tabular-nums; font-size: 1.1rem; }
        #test-title-ui { font-weight: bold; font-size: 1.2rem; color: var(--primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; }

        /* --- Question & Options Styling --- */
        .question-text { font-size: 1.5rem; line-height: 1.6; margin-bottom: 20px; color: var(--text-main); font-weight: 500; }
        .options-grid { display: flex; flex-direction: column; gap: 12px; margin-top: 25px; }
        .option-item { 
            font-size: 1.2rem; color: var(--text-main);
            display: flex; align-items: center; padding: 14px; border: 2px solid var(--border);
            border-radius: 10px; cursor: pointer; transition: 0.2s; background: var(--card-bg);
        }
        .option-item:hover { border-color: var(--primary); background: rgba(58, 134, 255, 0.05); }
        .option-item.selected { border-color: var(--primary); background: rgba(58, 134, 255, 0.1); font-weight: 600; color: var(--primary); }

       /* --- TABLE STYLING --- */
 .table-container { 
    overflow-x: auto; 
    margin: 25px 0; 
    border: 1px solid var(--border); 
    border-radius: 8px; 
    box-shadow: 0 2px 8px rgba(0,0,0,0.05); 
}

table { 
    border-collapse: collapse !important; 
    width: auto !important; 
    min-width: 60% !important; 
    max-width: 100% !important; 
    margin: 0 auto; 
    font-size: 1.5rem !important; 
    background: white !important; 
}

/* Header Styling */
tr:first-child td, tr:first-child th { 
    background-color: #3a86ff !important; 
    color: white !important;  
    padding: 15px 20px !important; 
    text-align: left !important;
    text-transform: uppercase;
    font-size: 1.2rem !important;
}

/* Data Cell Styling */
td, th { 
    border: 1px solid #dee2e6 !important; 
    padding: 12px 18px !important; 
    text-align: left !important; 
    color: #000000 !important;
    line-height: 1.2 !important; 
    white-space: nowrap; 
	font-weight: normal
}

/* --- BOLDING FIX FOR WORD CONTENT --- */
/* This ensures <strong> and <b> tags from Mammoth.js are actually bold */
td strong, th strong, td b, th b {
    font-weight: 500 !important;
    color: #000000 !important; /* Ensures bold text is deep black */
}

/* In Dark Mode, ensure bold text remains visible */
[data-theme="dark"] td strong, [data-theme="dark"] td b {
    color: #ffffff !important;
}

/* Question context within tables (if any) */
td p, th p { margin: 0 !important; padding: 0 !important; }

tr:nth-child(even) { background-color: #f8f9fa; }
        /* --- Sidebar & Mobile Navigator --- */
        .sidebar { width: 320px; position: sticky; top: 80px; height: fit-content; transition: transform 0.3s ease; }
        .panel { background: var(--card-bg); padding: 20px; border-radius: 12px; border: 1px solid var(--border); box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        #palette-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; max-height: 350px; overflow-y: auto; padding: 5px; }
        
        .q-num { aspect-ratio: 1/1; border: 1px solid var(--border); border-radius: 4px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; font-size: 1rem; background: #eee; color: #555; }
        .q-num.current { border: 2px solid var(--primary); background: var(--card-bg); color: var(--primary); }
        .q-num.answered { background: var(--success) !important; color: white !important; border: none; }
        .q-num.marked { background: var(--warning) !important; color: black !important; border-radius: 50%; }
        .q-num.not-answered { background: var(--danger) !important; color: white !important; }

        /* Mobile Navigator Button */
        #nav-toggle-btn { display: none; background: var(--primary); color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-left: 10px; }

        /* Overlay */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1500; }

        /* --- Buttons --- */
        .btn { padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; font-size: 0.9rem; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { border: 1px solid var(--border); background: none; color: var(--text-main); }
        .btn-warning { background: var(--warning); color: #000; }
        
        .hidden { display: none !important; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- MOBILE MEDIA QUERIES --- */
        @media (max-width: 900px) {
            .container { flex-direction: column; padding: 0 10px; }
            #nav-toggle-btn { display: block; }
            #test-title-ui { font-size: 1rem; max-width: 120px; }
            
            .sidebar { 
                position: fixed; top: 0; right: -340px; width: 300px; height: 100%; 
                z-index: 2000; background: var(--bg); box-shadow: -5px 0 15px rgba(0,0,0,0.1); 
                padding: 20px; box-sizing: border-box; overflow-y: auto; 
            }
            .sidebar.active { transform: translateX(-340px); }
            #overlay.active { display: block; }
            
            .question-area { padding: 15px; }
            .question-text { font-size: 1.2rem; }
            .option-item { font-size: 1rem; padding: 10px; }
            table { font-size: 1.1rem !important; }
        }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleNavigator()"></div>

<div class="top-bar">
    <div id="test-title-ui">Initializing...</div>
    <div id="timer">00:00</div>
    <div style="display:flex; align-items:center;">
        <button onclick="toggleTheme()" class="btn btn-outline" style="padding: 5px 10px;">🌓</button>
        <button id="nav-toggle-btn" onclick="toggleNavigator()">Grid ☰</button>
    </div>
</div>

<div id="loading-screen" style="text-align:center; padding:100px 20px;">
    <div class="loader"></div>
    <h3 id="status-text">Processing Question Paper...</h3>
</div>

<div id="main-ui" class="container hidden">
    <div class="exam-window">
        <div class="question-area">
            <div style="display:flex; justify-content:space-between; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
                <span style="font-weight:bold; color: var(--primary);">Q. <span id="current-q-num">1</span></span>
                <span id="marking-info" style="font-size: 0.8rem; color: #777;"></span>
            </div>
            <div id="question-display" class="question-text"></div>
            <div class="options-grid" id="options-display"></div>
        </div>

        <div style="display:flex; justify-content: space-between; margin-top:20px; gap: 8px; flex-wrap: wrap;">
    		<button class="btn btn-primary" style="flex:1; min-width: 80px;" onclick="nav(-1)">← Prev</button>
    		<button class="btn btn-outline" style="flex:1; min-width: 100px;" onclick="clearAns()">Clear</button>
    		<button class="btn btn-warning" style="flex:1; min-width: 80px;" onclick="markReview()">Review</button>
    		<button class="btn btn-primary" style="flex:2; min-width: 100px;" onclick="nav(1)">Save & Next →</button>
	</div>
    </div>

    <!-- Navigator Sidebar -->
    <div class="sidebar" id="navigator-sidebar">
        <div class="panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <span style="font-weight:bold;">Question Navigator</span>
                <button class="btn btn-outline" style="padding:2px 8px; display:none;" id="mobile-close-nav" onclick="toggleNavigator()">✕</button>
            </div>
            <div id="palette-container"></div>
            <hr style="margin:20px 0; border:0; border-top:1px solid var(--border);">
            <button class="btn" style="width:100%; background:var(--danger); color:white;" onclick="finishTest()">Final Submit</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaDjgR34EZ6e1IrlEkGkdMM8EhZY1-lkVPIsBttYfU-pTLII0gYvJbArhXjyBv2GrZhA/exec";
    
    const params = new URLSearchParams(window.location.search);
    const fileId = params.get('id');
    const testName = params.get('name') || "Practice Set";
    const testDuration = parseInt(params.get('time')) || 60; 
    const posMark = parseFloat(params.get('pos')) || 1;
    const negMark = parseFloat(params.get('neg')) || 0;

    let questions = [];
    let answers = [];
    let status = []; 
    let currentIndex = 0;
    let timeLeft = testDuration * 60;

    window.onbeforeunload = function() { return "Progress will be lost!"; };

    // Function to toggle navigator on mobile
    function toggleNavigator() {
        const sidebar = document.getElementById('navigator-sidebar');
        const overlay = document.getElementById('overlay');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    }

    async function init() {
        document.getElementById('test-title-ui').innerText = testName;
        document.getElementById('marking-info').innerText = `+${posMark} / -${negMark}`;
        if (!fileId) { document.getElementById('status-text').innerText = "Error: No ID."; return; }

        try {
            const response = await fetch(`${SCRIPT_URL}?id=${fileId}&action=download`);
            const data = await response.json();
            const bytes = atob(data.base64.replace(/\s/g, ''));
            const array = new Uint8Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) array[i] = bytes.charCodeAt(i);

            mammoth.convertToHtml({arrayBuffer: array.buffer}).then(res => {
                parseQuestions(res.value);
                if (questions.length > 0) startExam();
                else document.getElementById('status-text').innerText = "Format Error.";
            });
        } catch (err) { document.getElementById('status-text').innerText = "Network Error."; }
    }

    function parseQuestions(html) {
        const blocks = html.split(/Question:/gi).slice(1);
        questions = blocks.map(block => {
            const optA = block.match(/\(a\)\s*([\s\S]*?)(?=\s*\(b\))/i)?.[1] || "";
            const optB = block.match(/\(b\)\s*([\s\S]*?)(?=\s*\(c\))/i)?.[1] || "";
            const optC = block.match(/\(c\)\s*([\s\S]*?)(?=\s*\(d\))/i)?.[1] || "";
            const optD = block.match(/\(d\)\s*([\s\S]*?)(?=\s*Ans:)/i)?.[1] || "";
            
            const textOnly = block.replace(/<[^>]*>/g, ' ');
            const ansMatch = textOnly.match(/Ans\s*:\s*([a-d])/i);
            
            return {
                question: cleanFormat(block.split(/\(a\)/i)[0]),
                options: [optA, optB, optC, optD].map(o => cleanFormat(o)),
                correct: ansMatch ? ansMatch[1].toLowerCase().trim() : "a",
                explanation: cleanFormat(block.split(/Explanation:/i)[1] || "No explanation.")
            };
        });
        answers = Array(questions.length).fill(null);
        status = Array(questions.length).fill(0);
    }


   function cleanFormat(html) {
    if(!html) return "";
    let clean = html.trim();
    
    // Wrap any table found in the block
    if(clean.includes('<table')) {
        // Use a regex to wrap all tables in the string
        clean = clean.replace(/<table[\s\S]*?<\/table>/g, (match) => {
            return `<div class="table-container">${match}</div>`;
        });
    }
    
    // Responsive Images
    if(clean.includes('<img')) {
        clean = clean.replace(/<img/g, '<img style="max-width:100%; height:auto; display:block; margin:10px auto; border-radius:5px;"');
    }
    
    return clean;
}

    function startExam() {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('main-ui').classList.remove('hidden');
        renderQuestion();
        startTimer();
    }

    function renderQuestion() {
        if(status[currentIndex] === 0) status[currentIndex] = 1;
        const q = questions[currentIndex];
        document.getElementById('current-q-num').innerText = currentIndex + 1;
        document.getElementById('question-display').innerHTML = q.question;
        const optContainer = document.getElementById('options-display');
        optContainer.innerHTML = q.options.map((opt, i) => {
            const char = String.fromCharCode(97 + i);
            const isSelected = answers[currentIndex] === char;
            return `
                <div class="option-item ${isSelected ? 'selected' : ''}" onclick="selectOpt('${char}')">
                    <span style="margin-right:10px; color: var(--text-main);">(${char.toUpperCase()})</span> ${opt}
                </div>
            `;
        }).join('');
        updatePalette();
        if(window.MathJax) MathJax.typesetPromise();
    }

    function selectOpt(char) { answers[currentIndex] = char; status[currentIndex] = 2; renderQuestion(); }
    function markReview() { status[currentIndex] = 3; nav(1); }

    function nav(step) {
        let next = currentIndex + step;
        if(next >= 0 && next < questions.length) {
            currentIndex = next;
            renderQuestion();
            window.scrollTo(0,0);
            // Auto-hide navigator on mobile if user jumps
            if(window.innerWidth <= 900) {
                document.getElementById('navigator-sidebar').classList.remove('active');
                document.getElementById('overlay').classList.remove('active');
            }
        }
    }

    function updatePalette() {
        const container = document.getElementById('palette-container');
        container.innerHTML = questions.map((_, i) => {
            let cls = "q-num";
            if(i === currentIndex) cls += " current";
            if(status[i] === 1) cls += " not-answered";
            if(status[i] === 2) cls += " answered";
            if(status[i] === 3) cls += " marked";
            return `<div class="${cls}" onclick="jump(${i})">${i+1}</div>`;
        }).join('');
    }

    function jump(i) { currentIndex = i; renderQuestion(); nav(0); }

    function startTimer() {
        const timerObj = setInterval(() => {
            if(timeLeft <= 0) { clearInterval(timerObj); finishTest(true); }
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            timeLeft--;
        }, 1000);
    }

    function finishTest(auto = false) {
        if(!auto && !confirm("Confirm Submission?")) return;
        window.onbeforeunload = null;
        localStorage.setItem('last_questions', JSON.stringify(questions));
        localStorage.setItem('last_answers', JSON.stringify(answers));
        localStorage.setItem('last_status', JSON.stringify(status));
        localStorage.setItem('test_meta', JSON.stringify({ name: testName, pos: posMark, neg: negMark }));
        window.location.href = "results.html";
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    window.onload = init;
</script>
</body>
</html>
