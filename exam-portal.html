<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Test | SSC Portal</title>
    
    <script>
      window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] } };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

    <style>
        :root { --primary: #007bff; --success: #28a745; --danger: #dc3545; --warning: #ffc107; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 0; user-select: none; }
        
        .container { max-width: 1200px; margin: 20px auto; padding: 0 15px; display: flex; gap: 20px; }
        .exam-window { flex: 1; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: white; padding: 15px 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        #timer { font-weight: bold; color: #fff; background: var(--primary); padding: 8px 15px; border-radius: 5px; font-variant-numeric: tabular-nums; }

        .question-area { background: #fff; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); min-height: 350px; }
        #question-text { font-size: 1.15rem; margin-bottom: 25px; line-height: 1.6; white-space: pre-wrap; }

        .options label {
            display: flex; align-items: center; padding: 15px; border: 1px solid #eee;
            border-radius: 8px; margin-bottom: 12px; cursor: pointer; transition: 0.2s; background: #fff;
        }
        .options label.selected { background: #e7f3ff; border-color: var(--primary); font-weight: 500; }
        .options input { margin-right: 15px; transform: scale(1.2); }

        .sidebar { width: 300px; position: sticky; top: 20px; }
        .question-panel { background: #fff; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        
        /* Stats Grid Styling */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 15px; }
        .stat-item { 
            padding: 8px; border-radius: 4px; font-size: 0.7rem; text-align: center; 
            color: white; font-weight: bold; text-transform: uppercase;
        }

        #palette-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; max-height: 300px; overflow-y: auto; padding: 5px; }
        .q-num {
            aspect-ratio: 1/1; border: 1px solid #ddd; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; font-size: 0.85rem; background: #f8f9fa;
        }
        .q-num.current { border: 2px solid var(--primary); }
        .q-num.answered { background: var(--success); color: white; border-color: var(--success); }
        .q-num.not-answered { background: var(--danger); color: white; border-color: var(--danger); }
        .q-num.marked { background: var(--warning); color: black; border-color: var(--warning); border-radius: 50%; }

        .btn { padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-gray { background: #6c757d; color: white; }
        .btn-warn { background: var(--warning); color: #000; }
        #submitBtn { background: var(--danger); color: white; width: 100%; margin-top: 20px; }
        
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="loader" style="text-align:center; padding:100px;">⏳ Preparing Exam...</div>

<div id="exam-ui" class="container hidden">
    <div class="exam-window">
        <div class="header">
            <h2 id="test-name" style="margin:0">Loading...</h2>
            <div id="timer">00:00</div>
        </div>

        <div class="question-area">
            <div id="question-text"></div>
            <div class="options" id="opt-container"></div>
        </div>

        <div style="display:flex; justify-content: space-between; margin-top:20px;">
            <button class="btn btn-gray" onclick="nav(-1)">Previous</button>
            <div>
                <button class="btn btn-warn" onclick="markReview()">Mark for Review</button>
                <button class="btn btn-blue" style="margin-left:10px;" onclick="nav(1)">Save & Next</button>
            </div>
        </div>
    </div>

    <div class="sidebar">
        <div class="question-panel">
            <div class="stats-grid">
                <div class="stat-item" style="background:var(--success)" id="count-answered">0 Answered</div>
                <div class="stat-item" style="background:var(--danger)" id="count-skipped">0 Not Ans</div>
                <div class="stat-item" style="background:var(--warning); color:black;" id="count-marked">0 Marked</div>
                <div class="stat-item" style="background:#6c757d" id="count-unvisited">0 Unvisited</div>
            </div>
            <hr>
            <div id="palette-container"></div>
            <button id="submitBtn" class="btn" onclick="submitExam()">Finish Test</button>
        </div>
    </div>
</div>

<script>
    if (!localStorage.getItem('currentUser')) {
        window.location.replace('login.html');
    }

    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxFBULUle62aq2fAYmy0tlhYZ81JkzN38V_idbluc28h7TSwZ0Mw4_I_-0aKSQt66dR/exec";
    const params = new URLSearchParams(window.location.search);
    
    let questions = [];
    let currentIdx = 0;
    let answers = []; 
    let status = []; // 0:Unvisited, 1:Visited/NotAns, 2:Ans, 3:Marked
    let timeLeft = (parseInt(params.get('time')) || 60) * 60;

    async function init() {
        const sheetLink = params.get('sheet');
        document.getElementById('test-name').innerText = params.get('name') || "SSC Test";

        try {
            const res = await fetch(`${SCRIPT_URL}?sheet=${encodeURIComponent(sheetLink)}`);
            questions = await res.json();
            answers = Array(questions.length).fill("");
            status = Array(questions.length).fill(0); 
            status[0] = 1; // Mark first Q as Visited

            document.getElementById('loader').classList.add('hidden');
            document.getElementById('exam-ui').classList.remove('hidden');
            
            render();
            startTimer();
        } catch (e) {
            document.getElementById('loader').innerText = "❌ Error loading questions.";
        }
    }

    function render() {
        if(status[currentIdx] === 0) status[currentIdx] = 1;

        const q = questions[currentIdx];
        document.getElementById('question-text').innerHTML = `<strong>Question ${currentIdx + 1}:</strong><br><br>${q.question}`;
        
        const container = document.getElementById('opt-container');
        container.innerHTML = q.options.map((opt, i) => {
            const val = String.fromCharCode(97 + i);
            return `
                <label class="${answers[currentIdx] === val ? 'selected' : ''}">
                    <input type="radio" name="opt" value="${val}" ${answers[currentIdx] === val ? 'checked' : ''} 
                    onchange="saveAns('${val}')"> 
                    ${val.toUpperCase()}. ${opt}
                </label>
            `;
        }).join('');
        
        updatePalette();
        if(window.MathJax) MathJax.typesetPromise();
    }

    function saveAns(val) {
        answers[currentIdx] = val;
        status[currentIdx] = 2; 
        updatePalette();
    }

    function markReview() {
        status[currentIdx] = 3; 
        nav(1);
    }

    function nav(step) {
        let next = currentIdx + step;
        if(next >= 0 && next < questions.length) {
            currentIdx = next;
            render();
        }
    }

    function jump(i) {
        currentIdx = i;
        render();
    }

    function updatePalette() {
        // Update Palette Colors
        const palette = document.getElementById('palette-container');
        palette.innerHTML = questions.map((_, i) => {
            let cls = "q-num";
            if(i === currentIdx) cls += " current";
            if(status[i] === 1) cls += " not-answered";
            if(status[i] === 2) cls += " answered";
            if(status[i] === 3) cls += " marked";
            return `<div class="${cls}" onclick="jump(${i})">${i+1}</div>`;
        }).join('');

        // UPDATE THE COUNTERS
        document.getElementById('count-answered').innerText = status.filter(s => s === 2).length + " Answered";
        document.getElementById('count-skipped').innerText = status.filter(s => s === 1).length + " Not Ans";
        document.getElementById('count-marked').innerText = status.filter(s => s === 3).length + " Marked";
        document.getElementById('count-unvisited').innerText = status.filter(s => s === 0).length + " Unvisited";
    }

    function startTimer() {
        const interval = setInterval(() => {
            if(timeLeft <= 0) { clearInterval(interval); submitExam(true); }
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            timeLeft--;
        }, 1000);
    }

    function submitExam(isAuto = false) {
        if(!isAuto && !confirm("Finish and Submit Test?")) return;
        localStorage.setItem('last_questions', JSON.stringify(questions));
        localStorage.setItem('last_answers', JSON.stringify(answers));
        localStorage.setItem('last_status', JSON.stringify(status)); 
        localStorage.setItem('test_meta', JSON.stringify({
            name: document.getElementById('test-name').innerText,
            pos: params.get('pos') || 1,
            neg: params.get('neg') || 0.25
        }));
        window.location.href = "results.html";
    }

    window.onload = init;
</script>
</body>
</html>
