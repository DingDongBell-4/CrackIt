<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>CrackIt | Live Test Portal</title>
    
    <!-- External Dependencies -->
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth/1.4.21/mammoth.browser.min.js"></script>

    <style>
        :root { 
            --primary: #3a86ff; 
            --success: #2ecc71; 
            --danger: #e74c3c; 
            --warning: #ffbe0b; 
            --bg: #f4f7f9; 
            --card-bg: #ffffff; 
            --text-main: #000000;
            --text-muted: #636e72;
            --border: #dfe6e9; 
            --header-blue: #0056b3;
            --table-text: #0984e3;
        }
        [data-theme="dark"] { 
            --bg: #121212; 
            --card-bg: #1e1e1e; 
            --text-main: #f5f6fa; 
            --border: #333333; 
            --primary: #6ab0ff;
            --table-text: #74b9ff;
        }

        * { box-sizing: border-box; }
        
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            user-select: none; 
            transition: 0.3s; 
            overflow-x: hidden;
            padding: 0;
        }
        
        .top-bar { 
            background: var(--card-bg); 
            padding: 12px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.1); 
            position: sticky; 
            top: 0; 
            z-index: 1000;
            gap: 10px;
        }

        .top-bar-left { display: flex; align-items: center; gap: 10px; min-width: 0; }
        .top-bar-right { display: flex; align-items: center; gap: 8px; }
        
        .container { 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 15px; 
            display: flex; 
            gap: 15px;
        }
        
        /* --- Main Exam Area --- */
        .exam-window { flex: 1; width: 100%; }
        .question-area { 
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            min-height: 450px;
        }
        
        #timer { 
            font-weight: bold; 
            color: #fff; 
            background: var(--danger); 
            padding: 8px 14px; 
            border-radius: 5px; 
            font-variant-numeric: tabular-nums; 
            font-size: 0.95rem;
            white-space: nowrap;
        }
        
        #test-title-ui { 
            font-weight: bold; 
            font-size: 1rem;
            color: var(--primary); 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis; 
            flex: 1;
            min-width: 0;
        }

        /* --- Question & Options Styling --- */
        .question-text { 
            font-size: 1.3rem; 
            line-height: 1.6; 
            margin-bottom: 20px; 
            color: var(--text-main); 
            font-weight: 500;
        }
        
        .options-grid { 
            display: flex; 
            flex-direction: column; 
            gap: 12px; 
            margin-top: 20px;
        }
        
        .option-item { 
            font-size: 1.05rem; 
            color: var(--text-main);
            display: flex; 
            align-items: center; 
            padding: 14px; 
            border: 2px solid var(--border);
            border-radius: 10px; 
            cursor: pointer; 
            transition: all 0.2s; 
            background: var(--card-bg);
        }
        
        .option-item:active { transform: scale(0.98); }
        .option-item:hover { border-color: var(--primary); background: rgba(58, 134, 255, 0.05); }
        .option-item.selected { border-color: var(--primary); background: rgba(58, 134, 255, 0.1); font-weight: 600; color: var(--primary); }

        /* --- TABLE STYLING --- */
        .table-container { 
            overflow-x: auto; 
            margin: 20px 0; 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        table { 
            border-collapse: collapse !important; 
            width: auto !important; 
            min-width: 100% !important; 
            font-size: 0.95rem !important; 
            background: white !important;
        }

        tr:first-child td, tr:first-child th { 
            background-color: #3a86ff !important; 
            color: white !important;  
            padding: 12px 15px !important; 
            text-align: left !important;
            font-size: 0.9rem !important;
        }

        td, th { 
            border: 1px solid #dee2e6 !important; 
            padding: 10px 12px !important; 
            text-align: left !important; 
            color: #000000 !important;
            line-height: 1.3 !important;
        }

        td strong, th strong, td b, th b {
            font-weight: 600 !important;
            color: #000000 !important;
        }

        [data-theme="dark"] td strong, [data-theme="dark"] td b {
            color: #ffffff !important;
        }

        td p, th p { margin: 0 !important; padding: 0 !important; }
        tr:nth-child(even) { background-color: #f8f9fa; }

        /* --- Sidebar & Mobile Navigator --- */
        .sidebar { 
            width: 300px; 
            position: sticky; 
            top: 80px; 
            height: fit-content; 
            transition: transform 0.3s ease;
        }
        
        .panel { 
            background: var(--card-bg); 
            padding: 18px; 
            border-radius: 12px; 
            border: 1px solid var(--border); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        
        #palette-container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(35px, 1fr)); 
            gap: 8px; 
            margin-top: 12px;
            max-height: 350px; 
            overflow-y: auto; 
            padding: 5px;
        }
        
        .q-num { 
            aspect-ratio: 1/1; 
            border: 1px solid var(--border); 
            border-radius: 4px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.9rem; 
            background: #eee; 
            color: #555;
            transition: 0.15s;
        }
        
        .q-num:active { transform: scale(0.9); }
        .q-num.current { border: 2px solid var(--primary); background: var(--card-bg); color: var(--primary); }
        .q-num.answered { background: var(--success) !important; color: white !important; border: none; }
        .q-num.marked { background: var(--warning) !important; color: black !important; border-radius: 50%; }
        .q-num.not-answered { background: var(--danger) !important; color: white !important; }

        /* Mobile Navigator Button */
        #nav-toggle-btn { 
            display: none; 
            background: var(--primary); 
            color: white; 
            border: none; 
            padding: 8px 12px; 
            border-radius: 6px; 
            font-weight: bold; 
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        /* Overlay */
        #overlay { 
            display: none; 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.6); 
            z-index: 1500;
        }

        /* --- Buttons --- */
        .btn { 
            padding: 12px 16px; 
            border: none; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: 0.2s; 
            font-size: 0.9rem;
        }
        
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:active { transform: scale(0.98); }
        .btn-outline { border: 1px solid var(--border); background: none; color: var(--text-main); }
        .btn-warning { background: var(--warning); color: #000; }
        
        .action-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin-top: 20px;
        }
        
        .hidden { display: none !important; }
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* --- MOBILE MEDIA QUERIES --- */
        @media (max-width: 1024px) {
            .container { flex-direction: column; padding: 12px; gap: 12px; }
            #nav-toggle-btn { display: inline-block; }
            .sidebar { 
                position: fixed; 
                top: 0; 
                right: -320px; 
                width: 280px; 
                height: 100vh; 
                z-index: 2000; 
                background: var(--bg); 
                box-shadow: -5px 0 15px rgba(0,0,0,0.15); 
                padding: 15px; 
                padding-top: 70px;
                box-sizing: border-box; 
                overflow-y: auto;
                border-radius: 0;
            }
            
            .sidebar.active { transform: translateX(-320px); }
            #overlay.active { display: block; }
        }

        @media (max-width: 768px) {
            .top-bar { padding: 10px 12px; gap: 8px; }
            #test-title-ui { font-size: 0.9rem; }
            #timer { padding: 6px 10px; font-size: 0.85rem; }
            
            .question-area { padding: 18px; min-height: auto; }
            .question-text { font-size: 1.15rem; }
            .option-item { font-size: 0.95rem; padding: 12px; }
            
            table { font-size: 0.85rem !important; }
            tr:first-child td, tr:first-child th { padding: 10px 10px !important; font-size: 0.8rem !important; }
            td, th { padding: 8px 10px !important; }
            
            #palette-container { grid-template-columns: repeat(auto-fit, minmax(32px, 1fr)); }
            .q-num { font-size: 0.8rem; }
            
            .action-buttons { grid-template-columns: repeat(2, 1fr); }
            .btn { padding: 10px 12px; font-size: 0.85rem; }
        }

        @media (max-width: 480px) {
            body { padding: 0; }
            .top-bar { padding: 8px 10px; }
            .container { padding: 10px; }
            
            .question-area { padding: 15px; }
            .question-text { font-size: 1.05rem; margin-bottom: 15px; }
            .option-item { font-size: 0.9rem; padding: 11px; }
            
            #palette-container { grid-template-columns: repeat(5, 1fr); gap: 6px; }
            .q-num { font-size: 0.75rem; }
            
            .action-buttons { gap: 6px; }
            .btn { padding: 9px 10px; font-size: 0.8rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>

<div id="overlay" onclick="toggleNavigator()"></div>

<div class="top-bar">
    <div class="top-bar-left">
        <div id="test-title-ui">Initializing...</div>
    </div>
    <div class="top-bar-right">
        <div id="timer">00:00</div>
        <button onclick="toggleTheme()" class="btn btn-outline" style="padding: 5px 10px; font-size: 0.8rem;">🌓</button>
        <button id="nav-toggle-btn" onclick="toggleNavigator()">☰</button>
    </div>
</div>

<div id="loading-screen" style="text-align:center; padding:100px 20px;">
    <div class="loader"></div>
    <h3 id="status-text">Processing Question Paper...</h3>
</div>

<div id="main-ui" class="container hidden">
    <div class="exam-window">
        <div class="question-area">
            <div style="display:flex; justify-content:space-between; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">
                <span style="font-weight:bold; color: var(--primary);">Q. <span id="current-q-num">1</span></span>
                <span id="marking-info" style="font-size: 0.75rem; color: #777;"></span>
            </div>
            <div id="question-display" class="question-text"></div>
            <div class="options-grid" id="options-display"></div>
        </div>

        <div class="action-buttons">
            <button class="btn btn-primary" onclick="nav(-1)">← Prev</button>
            <button class="btn btn-outline" onclick="clearAns()">Clear</button>
            <button class="btn btn-warning" onclick="markReview()">⭐ Review</button>
            <button class="btn btn-primary" onclick="nav(1)">Next →</button>
        </div>
    </div>

    <!-- Navigator Sidebar -->
    <div class="sidebar" id="navigator-sidebar">
        <div class="panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                <span style="font-weight:bold; font-size:0.95rem;">Questions</span>
            </div>
            <div id="palette-container"></div>
            <hr style="margin:15px 0; border:0; border-top:1px solid var(--border);">
            <button class="btn" style="width:100%; background:var(--danger); color:white; font-size:0.9rem;" onclick="finishTest()">Submit Test</button>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwaDjgR34EZ6e1IrlEkGkdMM8EhZY1-lkVPIsBttYfU-pTLII0gYvJbArhXjyBv2GrZhA/exec";
    
    const params = new URLSearchParams(window.location.search);
    const fileId = params.get('id');
    const testName = params.get('name') || "Practice Set";
    const testDuration = parseInt(params.get('time')) || 60; 
    const posMark = parseFloat(params.get('pos')) || 1;
    const negMark = parseFloat(params.get('neg')) || 0;

    let questions = [];
    let answers = [];
    let status = []; 
    let currentIndex = 0;
    let timeLeft = testDuration * 60;

    window.onbeforeunload = function() { return "Progress will be lost!"; };

    function toggleNavigator() {
        const sidebar = document.getElementById('navigator-sidebar');
        const overlay = document.getElementById('overlay');
        sidebar.classList.toggle('active');
        overlay.classList.toggle('active');
    }

    async function init() {
        document.getElementById('test-title-ui').innerText = testName;
        document.getElementById('marking-info').innerText = `+${posMark} / -${negMark}`;
        if (!fileId) { document.getElementById('status-text').innerText = "Error: No ID."; return; }

        try {
            const response = await fetch(`${SCRIPT_URL}?id=${fileId}&action=download`);
            const data = await response.json();
            const bytes = atob(data.base64.replace(/\s/g, ''));
            const array = new Uint8Array(bytes.length);
            for (let i = 0; i < bytes.length; i++) array[i] = bytes.charCodeAt(i);

            mammoth.convertToHtml({arrayBuffer: array.buffer}).then(res => {
                parseQuestions(res.value);
                if (questions.length > 0) startExam();
                else document.getElementById('status-text').innerText = "Format Error.";
            });
        } catch (err) { document.getElementById('status-text').innerText = "Network Error."; }
    }

    function parseQuestions(html) {
        const blocks = html.split(/Question:/gi).slice(1);
        questions = blocks.map(block => {
            const optA = block.match(/\(a\)\s*([\s\S]*?)(?=\s*\(b\))/i)?.[1] || "";
            const optB = block.match(/\(b\)\s*([\s\S]*?)(?=\s*\(c\))/i)?.[1] || "";
            const optC = block.match(/\(c\)\s*([\s\S]*?)(?=\s*\(d\))/i)?.[1] || "";
            const optD = block.match(/\(d\)\s*([\s\S]*?)(?=\s*Ans:)/i)?.[1] || "";
            
            const textOnly = block.replace(/<[^>]*>/g, ' ');
            const ansMatch = textOnly.match(/Ans\s*:\s*([a-d])/i);
            
            return {
                question: cleanFormat(block.split(/\(a\)/i)[0]),
                options: [optA, optB, optC, optD].map(o => cleanFormat(o)),
                correct: ansMatch ? ansMatch[1].toLowerCase().trim() : "a",
                explanation: cleanFormat(block.split(/Explanation:/i)[1] || "No explanation.")
            };
        });
        answers = Array(questions.length).fill(null);
        status = Array(questions.length).fill(0);
    }

    function cleanFormat(html) {
        if(!html) return "";
        let clean = html.trim();
        
        if(clean.includes('<table')) {
            clean = clean.replace(/<table[\s\S]*?<\/table>/g, (match) => {
                return `<div class="table-container">${match}</div>`;
            });
        }
        
        if(clean.includes('<img')) {
            clean = clean.replace(/<img/g, '<img style="max-width:100%; height:auto; display:block; margin:10px auto; border-radius:5px;"');
        }
        
        return clean;
    }

    function startExam() {
        document.getElementById('loading-screen').classList.add('hidden');
        document.getElementById('main-ui').classList.remove('hidden');
        renderQuestion();
        startTimer();
    }

    function renderQuestion() {
        if(status[currentIndex] === 0) status[currentIndex] = 1;
        const q = questions[currentIndex];
        document.getElementById('current-q-num').innerText = currentIndex + 1;
        document.getElementById('question-display').innerHTML = q.question;
        const optContainer = document.getElementById('options-display');
        optContainer.innerHTML = q.options.map((opt, i) => {
            const char = String.fromCharCode(97 + i);
            const isSelected = answers[currentIndex] === char;
            return `
                <div class="option-item ${isSelected ? 'selected' : ''}" onclick="selectOpt('${char}')">
                    ${opt}
                </div>
            `;
        }).join('');
        updatePalette();
        if(window.MathJax) MathJax.typesetPromise();
    }

    function selectOpt(char) { answers[currentIndex] = char; status[currentIndex] = 2; renderQuestion(); }
    function markReview() { status[currentIndex] = 3; nav(1); }
    function clearAns() { answers[currentIndex] = null; status[currentIndex] = 1; renderQuestion(); }

    function nav(step) {
        let next = currentIndex + step;
        if(next >= 0 && next < questions.length) {
            currentIndex = next;
            renderQuestion();
            window.scrollTo(0,0);
            if(window.innerWidth <= 1024) {
                document.getElementById('navigator-sidebar').classList.remove('active');
                document.getElementById('overlay').classList.remove('active');
            }
        }
    }

    function updatePalette() {
        const container = document.getElementById('palette-container');
        container.innerHTML = questions.map((_, i) => {
            let cls = "q-num";
            if(i === currentIndex) cls += " current";
            if(status[i] === 1) cls += " not-answered";
            if(status[i] === 2) cls += " answered";
            if(status[i] === 3) cls += " marked";
            return `<div class="${cls}" onclick="jump(${i})">${i+1}</div>`;
        }).join('');
    }

    function jump(i) { currentIndex = i; renderQuestion(); nav(0); }

    function startTimer() {
        const timerObj = setInterval(() => {
            if(timeLeft <= 0) { clearInterval(timerObj); finishTest(true); }
            let m = Math.floor(timeLeft / 60), s = timeLeft % 60;
            document.getElementById('timer').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            timeLeft--;
        }, 1000);
    }

    function finishTest(auto = false) {
        if(!auto && !confirm("Confirm Submission?")) return;
        window.onbeforeunload = null;
        localStorage.setItem('last_questions', JSON.stringify(questions));
        localStorage.setItem('last_answers', JSON.stringify(answers));
        localStorage.setItem('last_status', JSON.stringify(status));
        localStorage.setItem('test_meta', JSON.stringify({ name: testName, pos: posMark, neg: negMark }));
        window.location.href = "results.html";
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    window.onload = init;
</script>
</body>
</html>
