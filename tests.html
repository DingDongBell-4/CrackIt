<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Portal - CrackIt Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            /* Colors */
            --primary: #3a86ff; 
            --primary-light: #6ab0ff;
            --primary-dark: #1e5dc4;
            --folder: #8338ec;
            --folder-light: #a855f7;
            --accent-red: #e63946; 
            --accent-red-light: #f55a6e;
            --success: #2ec4b6;
            --warning: #ffb703;
            --danger: #d62828;
            
            /* Backgrounds */
            --bg-dark: #0f1419;
            --bg-light: #f0f4f8;
            --surface-dark: #1a1f2e;
            --surface-light: #ffffff;
            --surface-secondary-dark: #242b3d;
            --surface-secondary-light: #f8fafc;
            
            /* Text */
            --text-dark: #0f1419;
            --text-light: #ffffff;
            --text-muted-dark: #8b92a9;
            --text-muted-light: #64748b;
            
            /* Borders & Effects */
            --border-light: rgba(255, 255, 255, 0.1);
            --border-dark: rgba(0, 0, 0, 0.1);
            --glass-light: rgba(255, 255, 255, 0.7);
            --glass-dark: rgba(15, 20, 25, 0.6);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 20px 48px rgba(0, 0, 0, 0.15);
            --shadow-xl: 0 32px 64px rgba(0, 0, 0, 0.18);
        }

        [data-theme="dark"] {
            --bg: var(--bg-dark);
            --surface: var(--surface-dark);
            --surface-secondary: var(--surface-secondary-dark);
            --text: var(--text-light);
            --text-muted: var(--text-muted-dark);
            --border: var(--border-light);
            --glass: var(--glass-dark);
        }

        [data-theme="light"] {
            --bg: var(--bg-light);
            --surface: var(--surface-light);
            --surface-secondary: var(--surface-secondary-light);
            --text: var(--text-dark);
            --text-muted: var(--text-muted-light);
            --border: var(--border-dark);
            --glass: var(--glass-light);
        }

        * { 
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html { scroll-behavior: smooth; }

        body { 
            background: var(--bg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
            color: var(--text); 
            transition: background 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            overflow-x: hidden;
            position: relative;
        }

        /* --- ANIMATED GRADIENT BACKGROUND --- */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                800px at 20% 50%,
                rgba(58, 134, 255, 0.1) 0%,
                transparent 80%
            ),
            radial-gradient(
                500px at 80% 80%,
                rgba(131, 56, 236, 0.1) 0%,
                transparent 80%
            );
            pointer-events: none;
            z-index: -1;
            animation: gradientShift 8s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% {
                background: radial-gradient(
                    800px at 20% 50%,
                    rgba(58, 134, 255, 0.1) 0%,
                    transparent 80%
                ),
                radial-gradient(
                    500px at 80% 80%,
                    rgba(131, 56, 236, 0.1) 0%,
                    transparent 80%
                );
            }
            50% {
                background: radial-gradient(
                    800px at 60% 40%,
                    rgba(58, 134, 255, 0.08) 0%,
                    transparent 80%
                ),
                radial-gradient(
                    500px at 30% 70%,
                    rgba(131, 56, 236, 0.08) 0%,
                    transparent 80%
                );
            }
        }

        /* --- NAVIGATION BAR --- */
        .top-bar {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 16px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            gap: 20px;
            flex-wrap: wrap;
            box-shadow: var(--shadow-sm);
        }

        .top-bar-left {
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .logo {
            font-family: 'Sora', sans-serif;
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(135deg, var(--primary), var(--folder-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
            animation: fadeInDown 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .nav-btn {
            padding: 10px 18px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 12px rgba(58, 134, 255, 0.2);
            text-decoration: none;
        }

        .nav-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(58, 134, 255, 0.35);
        }

        .nav-btn:active {
            transform: translateY(0);
        }

        .top-bar-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-btn {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--glass);
            backdrop-filter: blur(8px);
            color: var(--text);
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: var(--surface-secondary);
            transform: scale(1.05);
            border-color: var(--primary);
        }

        /* --- CONTAINER --- */
        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* --- CONTROL RIBBON --- */
        .control-ribbon {
            display: flex;
            gap: 16px;
            margin-bottom: 32px;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.1),
                rgba(255, 255, 255, 0.05)
            );
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            flex-wrap: wrap;
            align-items: center;
            animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.1s both;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-box {
            flex: 1;
            min-width: 260px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 12px 16px 12px 44px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 0.95rem;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            outline: none;
        }

        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(58, 134, 255, 0.15);
            background: var(--surface-secondary);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            opacity: 0.6;
            font-size: 1.1rem;
        }

        .filter-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filter-group label {
            font-size: 0.9rem;
            font-weight: 700;
            white-space: nowrap;
        }

        .select-input {
            padding: 10px 14px;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface-secondary);
            color: var(--text);
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            outline: none;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .select-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(58, 134, 255, 0.15);
        }

        /* --- BREADCRUMB --- */
        .breadcrumb-nav {
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.1),
                rgba(255, 255, 255, 0.05)
            );
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 16px 24px;
            border-radius: 14px;
            margin-bottom: 32px;
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
            box-shadow: var(--shadow-sm);
            animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s both;
        }

        .breadcrumb-nav button {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border: none;
            padding: 9px 16px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 12px rgba(58, 134, 255, 0.2);
        }

        .breadcrumb-nav button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(58, 134, 255, 0.35);
        }

        #current-path {
            margin-left: 8px;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
        }

        /* --- GRID --- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
            auto-rows: 1fr;
        }

        /* --- FAVORITES SECTION --- */
        .section-title {
            font-family: 'Sora', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            margin-top: 40px;
            margin-bottom: 20px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            display: inline-block;
            width: 3px;
            height: 24px;
            background: linear-gradient(135deg, var(--primary), var(--folder-light));
            border-radius: 2px;
        }

        .favorites-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
            margin-bottom: 60px;
            auto-rows: 1fr;
        }

        .empty-favorites {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            opacity: 0.5;
        }

        .empty-favorites-icon {
            font-size: 3rem;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        /* --- CARDS --- */
        .card {
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.1),
                rgba(255, 255, 255, 0.05)
            );
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            padding: 28px;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            height: 100%;
            animation: fadeInUp 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        /* Staggered animation for cards */
        .card:nth-child(1) { animation-delay: 0.3s; }
        .card:nth-child(2) { animation-delay: 0.35s; }
        .card:nth-child(3) { animation-delay: 0.4s; }
        .card:nth-child(4) { animation-delay: 0.45s; }
        .card:nth-child(5) { animation-delay: 0.5s; }
        .card:nth-child(n+6) { animation-delay: 0.55s; }

        /* Shimmer Effect */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.2),
                transparent
            );
            transition: left 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        .card:hover::before {
            left: 100%;
        }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--primary);
            box-shadow: 0 24px 48px rgba(58, 134, 255, 0.2);
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.15),
                rgba(255, 255, 255, 0.08)
            );
        }

        .card.folder-card {
            background: linear-gradient(
                135deg,
                rgba(131, 56, 236, 0.15),
                rgba(131, 56, 236, 0.08)
            );
        }

        .card.folder-card:hover {
            border-color: var(--folder-light);
            box-shadow: 0 24px 48px rgba(131, 56, 236, 0.2);
        }

        .card.file-card {
            background: linear-gradient(
                135deg,
                rgba(58, 134, 255, 0.12),
                rgba(58, 134, 255, 0.06)
            );
        }

        .card.file-card:hover {
            border-color: var(--primary);
            box-shadow: 0 24px 48px rgba(58, 134, 255, 0.2);
        }

        /* Card Header */
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
            min-height: 44px;
        }

        .card-icon {
            font-size: 2.8rem;
            line-height: 1;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.1));
        }

        .card-actions {
            display: flex;
            gap: 8px;
        }

        .card-favorite-btn {
            background: none;
            border: none;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 6px;
            border-radius: 8px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            opacity: 0.7;
        }

        .card-favorite-btn:hover {
            opacity: 1;
            transform: scale(1.2) rotate(-10deg);
        }

        .card-favorite-btn.favorited {
            opacity: 1;
            animation: heartBeat 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes heartBeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1.1); }
            75% { transform: scale(1.4); }
            100% { transform: scale(1.2); }
        }

        .card-title {
            margin: 16px 0 8px 0;
            font-size: 1.2rem;
            font-weight: 700;
            font-family: 'Sora', sans-serif;
            text-align: left;
            line-height: 1.3;
        }

        .card-desc {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-bottom: 16px;
            text-align: left;
            flex: 1;
            line-height: 1.5;
        }

        /* Badges */
        .badge-container {
            display: flex;
            justify-content: flex-start;
            gap: 8px;
            margin-top: 12px;
            flex-wrap: wrap;
        }

        .badge {
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 3px;
            letter-spacing: 0.2px;
            white-space: nowrap;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .badge-time {
            background: rgba(58, 134, 255, 0.2);
            color: var(--primary);
            padding: 8px 14px;
            font-size: 1rem;
            font-weight: 800;
        }

        .badge-stars {
            background: rgba(255, 183, 3, 0.2);
            color: var(--warning);
        }

        .badge-users {
            background: rgba(131, 56, 236, 0.2);
            color: var(--folder-light);
        }

        /* Test Stats */
        .test-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            font-size: 0.85rem;
        }

        .stat {
            text-align: left;
        }

        .stat-label {
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-weight: 700;
            font-size: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--folder-light));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Empty State */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 40px;
            opacity: 0.6;
            animation: fadeIn 0.6s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 0.6; }
        }

        .empty-state-icon {
            font-size: 4.5rem;
            margin-bottom: 24px;
            opacity: 0.5;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
        }

        .empty-state h3 {
            margin-bottom: 12px;
            font-family: 'Sora', sans-serif;
            font-size: 1.5rem;
        }

        /* Skeleton Loader */
        .skeleton-card {
            background: var(--surface);
            padding: 28px;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            animation: loading 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes loading {
            0%, 100% {
                background: linear-gradient(
                    90deg,
                    var(--surface-secondary) 0%,
                    var(--surface) 50%,
                    var(--surface-secondary) 100%
                );
                background-size: 200% 100%;
                background-position: -200% 0;
            }
            50% {
                background-position: 200% 0;
            }
        }

        .skeleton-icon {
            height: 44px;
            width: 44px;
            border-radius: 8px;
            background: var(--surface-secondary);
            margin-bottom: 12px;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .skeleton-title {
            height: 24px;
            margin-bottom: 12px;
            border-radius: 8px;
            background: var(--surface-secondary);
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .skeleton-text {
            height: 16px;
            margin-bottom: 12px;
            border-radius: 6px;
            background: var(--surface-secondary);
            width: 100%;
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        .skeleton-text:last-child {
            width: 60%;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 0.8; }
        }

        /* Hidden class */
        .hidden { display: none !important; }

        /* Responsive */
        @media (max-width: 1024px) {
            .container { padding: 32px 20px; }
            .top-bar { padding: 14px 20px; gap: 14px; }
            .logo { font-size: 1.3rem; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 20px; }
        }

        @media (max-width: 768px) {
            .container { padding: 24px 16px; }
            .top-bar { padding: 12px 16px; flex-direction: column; }
            .top-bar-left { width: 100%; justify-content: space-between; }
            .logo { font-size: 1.1rem; }
            .nav-btn { padding: 9px 14px; font-size: 0.9rem; }
            .grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; }
            .control-ribbon { padding: 16px; }
            .search-box { min-width: 100%; }
            .card { padding: 20px; }
            .card-title { font-size: 1rem; }
            .card-icon { font-size: 2.2rem; }
        }

        @media (max-width: 480px) {
            .container { padding: 16px 12px; }
            .top-bar { padding: 10px 12px; }
            .logo { font-size: 1rem; }
            .nav-btn { padding: 8px 12px; font-size: 0.85rem; }
            .grid { grid-template-columns: 1fr; gap: 12px; }
            .card { padding: 16px; }
            .card-title { font-size: 0.95rem; }
            .card-icon { font-size: 2rem; }
            .badge-container { gap: 6px; }
            .badge { padding: 4px 8px; font-size: 0.65rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }

        /* Dark Mode Specific */
        [data-theme="dark"] .control-ribbon,
        [data-theme="dark"] .breadcrumb-nav {
            background: linear-gradient(
                135deg,
                rgba(58, 134, 255, 0.08),
                rgba(131, 56, 236, 0.05)
            );
        }
    </style>
</head>
<body data-theme="light">

<div class="top-bar">
    <div class="top-bar-left">
        <div class="logo">🚀 CrackIt</div>
        <a href="index.html" class="nav-btn">📊 Dashboard</a>
    </div>
    <div class="top-bar-right">
        <button class="icon-btn" onclick="toggleFS()" id="fs-btn" title="Toggle Fullscreen">🖥️</button>
        <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle Theme">🌙</button>
    </div>
</div>

<div class="container">
    <!-- Control Ribbon -->
    <div class="control-ribbon">
        <div class="search-box">
            <span class="search-icon">🔍</span>
            <input 
                type="text" 
                id="search-input" 
                placeholder="Search tests..." 
                onkeyup="renderExplorer()"
            >
        </div>

        <div class="filter-group">
            <label>Sort:</label>
            <select id="sort-select" class="select-input" onchange="renderExplorer()">
                <option value="name-az">Name (A-Z)</option>
                <option value="name-za">Name (Z-A)</option>
                <option value="recent">Recently Added</option>
            </select>
        </div>
    </div>

    <!-- Favorites Section -->
    <div id="favorites-section">
        <div class="section-title">⭐ Favorites</div>
        <div id="favorites-grid" class="favorites-grid"></div>
    </div>

    <!-- Breadcrumb Navigation -->
    <div class="breadcrumb-nav">
        <button onclick="goHome()">🏠 Home</button>
        <button id="back-btn" class="hidden" onclick="goBack()">⬅ Back</button>
        <span id="current-path">Root</span>
    </div>

    <!-- Explorer Grid -->
    <div id="explorer-grid" class="grid">
        <!-- Skeleton Loaders -->
        <div class="skeleton-card">
            <div class="skeleton-icon"></div>
            <div class="skeleton-title"></div>
            <div class="skeleton-text"></div>
            <div class="skeleton-text"></div>
        </div>
        <div class="skeleton-card">
            <div class="skeleton-icon"></div>
            <div class="skeleton-title"></div>
            <div class="skeleton-text"></div>
            <div class="skeleton-text"></div>
        </div>
        <div class="skeleton-card">
            <div class="skeleton-icon"></div>
            <div class="skeleton-title"></div>
            <div class="skeleton-text"></div>
            <div class="skeleton-text"></div>
        </div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxzSR-Ilpj2N5sq5IuBHFX6fqz0CbkavOTixZFMik-822VBtS1MDXNLhMbHGP-T-zkK/exec";
    
    let allData = [];
    let currentPath = [];
    let favorites = JSON.parse(localStorage.getItem('test_favorites') || '[]');
    let recentlyViewed = JSON.parse(localStorage.getItem('test_recent') || '[]');

    async function initExplorer() {
        const grid = document.getElementById('explorer-grid');
        try {
            const res = await fetch(SCRIPT_URL);
            allData = await res.json();
            renderExplorer();
        } catch (e) {
            console.error('Load error:', e);
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">⚠️</div>
                    <h3>Failed to load data</h3>
                    <p>Please check your connection and refresh.</p>
                </div>
            `;
        }
    }

    function parseFileName(fullName) {
        const parts = fullName.split('|').map(p => p.trim());
        // Remove file extensions (.docx, .pdf, .xlsx, etc.)
        let cleanName = parts[0] || fullName;
        cleanName = cleanName.replace(/\.\w+$/, ''); // Removes extension like .docx, .pdf
        
        return {
            cleanName: cleanName,
            duration: parts[1] || "60",
            pos: parts[2] || "1",
            neg: parts[3] || "0"
        };
    }

    function toggleFavorite(fileId, event) {
        event.stopPropagation();
        if (favorites.includes(fileId)) {
            favorites = favorites.filter(id => id !== fileId);
        } else {
            favorites.push(fileId);
        }
        localStorage.setItem('test_favorites', JSON.stringify(favorites));
        renderExplorer();
    }

    function addToRecent(fileId) {
        recentlyViewed = recentlyViewed.filter(id => id !== fileId);
        recentlyViewed.unshift(fileId);
        if (recentlyViewed.length > 5) recentlyViewed.pop();
        localStorage.setItem('test_recent', JSON.stringify(recentlyViewed));
    }

    function renderExplorer() {
        const grid = document.getElementById('explorer-grid');
        const favGrid = document.getElementById('favorites-grid');
        const favSection = document.getElementById('favorites-section');
        const searchTerm = document.getElementById('search-input').value.toLowerCase();
        const sortType = document.getElementById('sort-select').value;
        grid.innerHTML = '';
        favGrid.innerHTML = '';
        
        document.getElementById('current-path').innerText = currentPath.length === 0 ? "Root" : currentPath.join(" / ");
        currentPath.length > 0 ? document.getElementById('back-btn').classList.remove('hidden') : document.getElementById('back-btn').classList.add('hidden');

        // Show favorites only on home page
        if (currentPath.length === 0) {
            favSection.style.display = 'block';
            renderFavorites(favGrid);
        } else {
            favSection.style.display = 'none';
        }

        let folders = new Set();
        let files = [];

        allData.forEach(item => {
            const pathArr = item.folder ? item.folder.split('/') : [];
            const isMatchPath = currentPath.every((folder, i) => pathArr[i] === folder);
            
            if (isMatchPath) {
                if (pathArr.length > currentPath.length) {
                    const folderName = pathArr[currentPath.length];
                    if (folderName.toLowerCase().includes(searchTerm)) folders.add(folderName);
                } else if (pathArr.length === currentPath.length) {
                    const meta = parseFileName(item.name);
                    if (meta.cleanName.toLowerCase().includes(searchTerm)) {
                        item.parsedMeta = meta;
                        item.fileId = item.id;
                        files.push(item);
                    }
                }
            }
        });

        // Sorting
        if (sortType === 'name-az') files.sort((a, b) => a.parsedMeta.cleanName.localeCompare(b.parsedMeta.cleanName));
        if (sortType === 'name-za') files.sort((a, b) => b.parsedMeta.cleanName.localeCompare(a.parsedMeta.cleanName));

        // Render Folders
        Array.from(folders).sort().forEach(name => {
            const card = document.createElement('div');
            card.className = 'card folder-card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="card-icon">📁</div>
                </div>
                <h3 class="card-title">${name}</h3>
            `;
            card.onclick = () => { currentPath.push(name); renderExplorer(); };
            grid.appendChild(card);
        });

        // Render Files
        files.forEach(file => {
            const m = file.parsedMeta;
            const isFavorited = favorites.includes(file.fileId);
            
            const card = document.createElement('div');
            card.className = 'card file-card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="card-icon">📄</div>
                    <div class="card-actions">
                        <button class="card-favorite-btn ${isFavorited ? 'favorited' : ''}" 
                                onclick="toggleFavorite('${file.fileId}', event)" 
                                title="${isFavorited ? 'Remove favorite' : 'Add favorite'}">
                            ${isFavorited ? '⭐' : '☆'}
                        </button>
                    </div>
                </div>
                <h3 class="card-title">${m.cleanName}</h3>
                
                <div class="badge-container">
                    <span class="badge badge-time">⏱️ ${m.duration}m</span>
                </div>

                <div class="test-stats">
                    <div class="stat">
                        <div class="stat-label">Correct</div>
                        <div class="stat-value">+${m.pos}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Wrong</div>
                        <div class="stat-value">−${m.neg}</div>
                    </div>
                </div>
            `;
            
            card.onclick = () => {
                addToRecent(file.fileId);
                const query = new URLSearchParams({
                    id: file.fileId,
                    name: m.cleanName,
                    time: m.duration,
                    pos: m.pos,
                    neg: m.neg
                }).toString();
                window.location.href = `exam-portal.html?${query}`;
            };
            grid.appendChild(card);
        });

        if (!folders.size && !files.length) {
            grid.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">🔍</div>
                    <h3>No tests found</h3>
                    <p>Try adjusting your search</p>
                </div>
            `;
        }
    }

    function renderFavorites(container) {
        const favFiles = [];

        allData.forEach(item => {
            if (favorites.includes(item.id)) {
                const meta = parseFileName(item.name);
                item.parsedMeta = meta;
                item.fileId = item.id;
                favFiles.push(item);
            }
        });

        if (favFiles.length === 0) {
            container.innerHTML = `
                <div class="empty-favorites">
                    <div class="empty-favorites-icon">📌</div>
                    <p>No favorites yet. Star a test to see it here!</p>
                </div>
            `;
            return;
        }

        favFiles.forEach(file => {
            const m = file.parsedMeta;
            
            const card = document.createElement('div');
            card.className = 'card file-card';
            card.innerHTML = `
                <div class="card-header">
                    <div class="card-icon">📄</div>
                    <div class="card-actions">
                        <button class="card-favorite-btn favorited" 
                                onclick="toggleFavorite('${file.fileId}', event)" 
                                title="Remove favorite">
                            ⭐
                        </button>
                    </div>
                </div>
                <h3 class="card-title">${m.cleanName}</h3>
                
                <div class="badge-container">
                    <span class="badge badge-time">⏱️ ${m.duration}m</span>
                </div>

                <div class="test-stats">
                    <div class="stat">
                        <div class="stat-label">Correct</div>
                        <div class="stat-value">+${m.pos}</div>
                    </div>
                    <div class="stat">
                        <div class="stat-label">Wrong</div>
                        <div class="stat-value">−${m.neg}</div>
                    </div>
                </div>
            `;
            
            card.onclick = () => {
                addToRecent(file.fileId);
                const query = new URLSearchParams({
                    id: file.fileId,
                    name: m.cleanName,
                    time: m.duration,
                    pos: m.pos,
                    neg: m.neg
                }).toString();
                window.location.href = `exam-portal.html?${query}`;
            };
            container.appendChild(card);
        });
    }

    function goBack() { currentPath.pop(); renderExplorer(); }
    function goHome() { currentPath = []; renderExplorer(); }

    function toggleTheme() {
        const body = document.body;
        const currentTheme = body.getAttribute('data-theme');
        const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
        body.setAttribute('data-theme', newTheme);
        document.getElementById('theme-btn').innerText = newTheme === 'dark' ? '☀️' : '🌙';
        localStorage.setItem('theme', newTheme);
    }

    function toggleFS() {
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(err => {
                console.error(`Error: ${err.message}`);
            });
        } else {
            document.exitFullscreen();
        }
    }

    // Load saved theme
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.body.setAttribute('data-theme', savedTheme);

    window.onload = initExplorer;
</script>
</body>
</html>
