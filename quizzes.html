<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Quiz App</title>
    
    <script>
        window.MathJax = {
            tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] }
        };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>

<style>
    :root { --primary: #4a90e2; --success: #2ecc71; --error: #e74c3c; --bg: #f4f7f6; --text: #2d3436; }
    body { background: var(--bg); font-family: 'Segoe UI', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 15px; color: var(--text); }
    
    .quiz-container { background: white; width: 100%; max-width: 550px; border-radius: 16px; box-shadow: 0 12px 40px rgba(0,0,0,0.08); overflow: hidden; display: flex; flex-direction: column; }
    
    .content { padding: 30px; }
    
    #question { line-height: 1.6; margin: 0 0 25px 0; font-size: 1.25rem; font-weight: 600; white-space: pre-line; }
    
    .options-grid { display: grid; gap: 14px; }
    
    .option-item { padding: 16px; border: 2px solid #e2e8f0; border-radius: 12px; cursor: pointer; transition: all 0.25s ease; background: #fff; font-weight: 500; font-size: 1rem; }
    .option-item:hover:not(.disabled) { border-color: var(--primary); background: #f0f7ff; transform: translateY(-1px); }
    .option-item.correct { background: #dcfce7 !important; border-color: var(--success) !important; color: #166534; }
    .option-item.wrong { background: #fee2e2 !important; border-color: var(--error) !important; color: #991b1b; }
    .option-item.disabled { pointer-events: none; }
    
    .data-table { width: 100%; margin: 20px 0; border-collapse: collapse; font-size: 0.9rem; }
    .data-table th, .data-table td { padding: 10px; border: 1px solid #cbd5e1; text-align: center; }
    .data-table th { background-color: var(--primary); color: white; }
    
    #next-btn { background: var(--primary); color: white; border: none; width: 100%; padding: 18px; font-weight: bold; cursor: pointer; font-size: 1rem; transition: background 0.2s; }
    #next-btn:hover { background: #357abd; }
    
    #explanation-box { padding: 25px; background: #f8fafc; border-top: 1px solid #e2e8f0; border-left: 6px solid var(--primary); white-space: pre-line; }
    .exp-label { color: var(--primary); font-weight: 800; text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.05em; display: block; margin-bottom: 10px; }
    
    .hidden { display: none !important; }
</style>
</head>
<body>

<div class="quiz-container">
    <div id="loading" style="text-align:center; padding:3rem;">Loading...</div>
    <div id="quiz-box" class="content hidden">
        <h2 id="question"></h2>
        <div class="options-grid" id="options-container"></div>
    </div>
    <button id="next-btn" class="hidden">Next Question →</button>
    <div id="explanation-box" class="hidden">
        <span class="exp-label">Explanation & Solution</span>
        <div id="explanation-text"></div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxU2n1UiBH5_EgKdHIMMIx69ClT9ASIeDL9e2kHjI2bnhqCX3SdIIUb9TERWAsEsIts/exec';
    let questions = [];
    let currentIndex = 0;

    async function loadData() {
        try {
            const res = await fetch(API_URL);
            questions = (await res.json()).filter(q => q.question);
            document.getElementById('loading').classList.add('hidden');
            document.getElementById('quiz-box').classList.remove('hidden');
            showQuestion();
        } catch (e) { document.getElementById('loading').innerHTML = "Error loading."; }
    }

    function parseTableData(input) {
        if (!input) return "";
        const tableRegex = /\|\|\|(.*?)\|\|\|/gs;
        return input.replace(tableRegex, (match, content) => {
            const rows = content.trim().split('||');
            let html = '<table class="data-table"><thead>';
            rows.forEach((row, index) => {
                const cols = row.split('|');
                if (index === 0) html += '<tr><th>' + cols.join('</th><th>') + '</th></tr></thead><tbody>';
                else html += '<tr><td>' + cols.join('</td><td>') + '</td></tr>';
            });
            return html + '</tbody></table>';
        });
    }

    function showQuestion() {
        const data = questions[currentIndex];
        document.getElementById('question').innerHTML = parseTableData(data.question);
        document.getElementById('next-btn').classList.add('hidden');
        document.getElementById('explanation-box').classList.add('hidden');
        
        const container = document.getElementById('options-container');
        container.innerHTML = '';
        
        ['a', 'b', 'c', 'd'].forEach(letter => {
            if (data[letter]) {
                const div = document.createElement('div');
                div.className = 'option-item';
                div.innerHTML = data[letter];
                div.onclick = () => checkAnswer(div);
                div.dataset.isCorrect = (letter === String(data.correct).toLowerCase().trim());
                container.appendChild(div);
            }
        });
        if (window.MathJax) MathJax.typesetPromise();
    }

    function checkAnswer(selectedDiv) {
        document.querySelectorAll('.option-item').forEach(opt => {
            opt.classList.add('disabled');
            if (opt.dataset.isCorrect === "true") opt.classList.add('correct');
        });
        if (selectedDiv.dataset.isCorrect !== "true") selectedDiv.classList.add('wrong');
        
        document.getElementById('next-btn').classList.remove('hidden');
        const data = questions[currentIndex];
        if (data.explanation) {
            const expText = document.getElementById('explanation-text');
            expText.innerHTML = parseTableData(data.explanation);
            document.getElementById('explanation-box').classList.remove('hidden');
            if (window.MathJax) MathJax.typesetPromise([expText]);
        }
    }

    // Logic for Random Questions
    document.getElementById('next-btn').onclick = () => {
        currentIndex = Math.floor(Math.random() * questions.length);
        showQuestion();
    };

    loadData();
</script>
</body>
</html>
