<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - SSC Portal</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f9; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 350px; }
        h2 { color: #28a745; text-align: center; margin-bottom: 1.5rem; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Login</h2>
        <input type="tel" id="phone" placeholder="Phone Number">
        <input type="password" id="pass" placeholder="Password">
        <button id="loginBtn" onclick="login()">Access Exam</button>
        <div style="text-align:center; margin-top:1rem; font-size:0.9rem;">New student? <a href="register.html">Register</a></div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz7i-Wyfqt2LnFQE3EOQcYeU14OHa51QQWyG6ciglLp1TyxeeyMSppC0wukgMfKectJzg/exec";

        async function login() {
            const phone = document.getElementById('phone').value.trim();
            const pass = document.getElementById('pass').value.trim();
            const btn = document.getElementById('loginBtn');

            if (!phone || !pass) return alert("Enter credentials!");

            btn.innerText = "Verifying...";
            btn.disabled = true;

            try {
                const response = await fetch(`${SCRIPT_URL}?action=login&phone=${phone}&password=${pass}`);
                const result = await response.text();

                if (result.trim() === "Valid") {
                    localStorage.setItem('currentUser', phone);
                    window.location.href = 'index.html';
                } else {
                    alert("Wrong Phone or Password!");
                    btn.disabled = false;
                    btn.innerText = "Access Exam";
                }
            } catch (err) {
                alert("Connection failed.");
                btn.disabled = false;
                btn.innerText = "Access Exam";
            }
        }
    </script>
</body>
</html>
