<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Test Results - Review Portal</title>
    
    <script>
      window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']], displayMath: [['$$', '$$']] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <style>
        :root { 
            --primary: #3a86ff; 
            --success: #2ecc71; 
            --danger: #e74c3c; 
            --warning: #ffbe0b; 
            --ssc-blue: #0056b3; 
            --light-bg: #f4f7f9; 
            --card-bg: #ffffff;
            --text: #000000;
            --border: #dfe6e9;
        }
        
        [data-theme="dark"] {
            --light-bg: #121212;
            --card-bg: #1e1e1e;
            --text: #f5f6fa;
            --border: #333333;
        }
        
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            padding: 15px; 
            font-family: 'Segoe UI', sans-serif; 
            background: var(--light-bg); 
            color: var(--text); 
            line-height: 1.6;
            transition: 0.3s;
        }
        
        .container { 
            max-width: 950px; 
            margin: 0 auto; 
        }
        
        /* Results Header */
        #results-container {
            background: var(--card-bg); 
            padding: 25px; 
            border-radius: 15px; 
            box-shadow: 0 5px 25px rgba(0,0,0,0.08); 
            text-align: center; 
            margin-bottom: 25px;
            border: 1px solid var(--border);
        }
        
        .score-big { 
            font-size: clamp(2.5rem, 8vw, 4em); 
            color: var(--primary); 
            font-weight: bold; 
            margin: 10px 0;
        }
        
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); 
            gap: 12px; 
            margin: 20px 0;
        }
        
        .stat-box { 
            padding: 15px; 
            border-radius: 10px;
            background: #fff;
            border: 1px solid var(--border);
            border-bottom: 4px solid #ddd;
        }
        
        .stat-box.correct { border-bottom-color: var(--success); color: var(--success); }
        .stat-box.wrong { border-bottom-color: var(--danger); color: var(--danger); }
        .stat-box.skipped { border-bottom-color: var(--warning); color: #856404; }
        
        .stat-val { 
            font-size: 1.6em; 
            font-weight: bold; 
            display: block;
        }
        
        .stat-label { 
            font-size: 0.7em; 
            text-transform: uppercase; 
            font-weight: bold; 
            color: #636e72;
            margin-top: 5px;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }
        
        .action-btn { 
            padding: 12px 24px; 
            border: none; 
            border-radius: 8px; 
            background: var(--primary); 
            color: #fff; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.9rem;
            transition: 0.2s;
            white-space: nowrap;
        }
        
        .action-btn:active { transform: scale(0.98); }
        .action-btn.secondary { background: var(--border); color: var(--text); }
        .action-btn:hover { opacity: 0.9; }

        /* Filter Bar */
        .filter-section {
            background: var(--card-bg);
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: wrap;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }
        
        .filter-btn { 
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: 20px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            background: rgba(0,0,0,0.02);
            color: var(--text);
            transition: 0.2s;
        }
        
        .filter-btn.active { 
            transform: scale(1.05);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            color: white;
        }
        
        #btn-all.active { background: #2d3436; }
        #btn-correct.active { background: var(--success); }
        #btn-wrong.active { background: var(--danger); }
        #btn-skipped.active { background: var(--warning); color: #000; }

        /* Review Cards */
        .review-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 18px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.05);
            border-left: 6px solid #ccc;
            border: 1px solid var(--border);
            border-left-width: 6px;
        }
        
        .correct-border { border-left-color: var(--success); }
        .wrong-border { border-left-color: var(--danger); }
        .skipped-border { border-left-color: var(--warning); }

        .q-text { 
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text);
        }
        
        .opt { 
            padding: 12px 14px;
            font-size: 0.95rem;
            margin: 8px 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(0,0,0,0.02);
            gap: 10px;
        }
        
        .opt-correct { 
            background: var(--success); 
            border-color: #27ae60;
            color: #ffffff;
            font-weight: 600;
        }
        
        .opt-wrong { 
            background: var(--danger);
            border-color: #c0392b;
            color: #ffffff;
        }

        .opt div, .opt p, .opt span {
            margin: 0 !important;
            padding: 0 !important;
            display: flex;
            align-items: center;
        }

        .MathJax {
            max-width: 100%;
            overflow-x: auto;
        }

        .explanation-box {
            margin-top: 15px;
            padding: 15px;
            background: #f0f7ff;
            border-radius: 8px;
            border-left: 5px solid var(--primary);
            font-size: 0.95rem;
        }

        [data-theme="dark"] .explanation-box {
            background: rgba(58, 134, 255, 0.1);
        }

        /* Table Styling */
        .table-container { 
            overflow-x: auto;
            margin: 15px 0;
            border: 1px solid var(--border);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        table { 
            border-collapse: collapse !important;
            width: auto !important;
            min-width: 100% !important;
            font-size: 0.9rem !important;
            background: white !important;
        }

        tr:first-child td, tr:first-child th { 
            background-color: #3a86ff !important;
            color: white !important;
            padding: 10px !important;
            text-align: left !important;
            font-size: 0.8rem !important;
	    font-weight: 700 !important;
        }

        td, th { 
            border: 1px solid #dee2e6 !important;
            padding: 8px 10px !important;
            text-align: left !important;
            color: #000000 !important;
            line-height: 1.3 !important;
	    font-weight: 400 !important;
        }

        td strong, th strong, td b, th b {
            font-weight: 600 !important;
        }

        td p, th p { margin: 0 !important; padding: 0 !important; }
        tr:nth-child(even) { background-color: #f8f9fa; }

        .badge {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.7rem;
            color: white;
            font-weight: 800;
            margin-bottom: 10px;
            display: inline-block;
            letter-spacing: 0.5px;
        }

        .review-img {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 12px auto;
            border-radius: 6px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        /* PDF Export Styles */
        .pdf-hidden { display: none; }
        
        @media print {
            body { padding: 0; margin: 0; background: white; }
            .container { max-width: 100%; }
            .action-buttons, .filter-section, #results-container .action-btn { display: none; }
            .review-card { page-break-inside: avoid; box-shadow: none; border: 1px solid #ccc; }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body { padding: 12px; }
            .container { padding: 0; }
            
            #results-container { padding: 18px; }
            .score-big { font-size: 2.5rem; }
            
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .stat-val { font-size: 1.4em; }
            
            .action-buttons { gap: 8px; }
            .action-btn { padding: 10px 18px; font-size: 0.85rem; }
            
            .filter-section { padding: 10px; gap: 6px; }
            .filter-btn { padding: 7px 12px; font-size: 0.75rem; }
            
            .review-card { padding: 16px; margin-bottom: 14px; }
            .q-text { font-size: 1rem; }
            .opt { padding: 10px 12px; font-size: 0.9rem; }
            
            .explanation-box { padding: 12px; font-size: 0.9rem; }
            
            table { font-size: 0.8rem !important; }
            tr:first-child td, tr:first-child th { padding: 8px !important; font-size: 0.75rem !important; }
            td, th { padding: 6px 8px !important; }
        }

        @media (max-width: 480px) {
            body { padding: 10px; }
            
            #results-container { padding: 15px; }
            .score-big { font-size: 2rem; margin: 8px 0; }
            
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
            .stat-box { padding: 12px; }
            .stat-val { font-size: 1.2em; }
            .stat-label { font-size: 0.65em; }
            
            .action-buttons { gap: 6px; }
            .action-btn { padding: 9px 14px; font-size: 0.8rem; flex: 1; min-width: 0; }
            
            .filter-btn { padding: 6px 10px; font-size: 0.7rem; }
            
            .review-card { padding: 14px; }
            .q-text { font-size: 0.95rem; }
            .opt { padding: 10px; font-size: 0.85rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="results-container">
        <h2 id="test-display-name">Exam Result</h2>
        <div class="score-big" id="final-score">0.00</div>
        <p id="marks-info" style="color: #636e72; font-weight: 500; margin: 8px 0;"></p>
        
        <div class="stats-grid">
            <div class="stat-box correct">
                <span class="stat-val" id="stat-correct">0</span>
                <span class="stat-label">Correct</span>
            </div>
            <div class="stat-box wrong">
                <span class="stat-val" id="stat-wrong">0</span>
                <span class="stat-label">Wrong</span>
            </div>
            <div class="stat-box skipped">
                <span class="stat-val" id="stat-skipped">0</span>
                <span class="stat-label">Skipped</span>
            </div>
            <div class="stat-box" style="border-bottom-color:#6c757d; color:#6c757d;">
                <span class="stat-val" id="stat-unvisit">0</span>
                <span class="stat-label">Unvisited</span>
            </div>
        </div>

        <div class="action-buttons">
            <button class="action-btn" onclick="exportPDF()">📥 Download PDF</button>
            <button class="action-btn secondary" onclick="printResults()">🖨️ Print</button>
            <button class="action-btn secondary" onclick="window.location.href='index.html'">← Back</button>
        </div>
    </div>

    <div class="filter-section">
        <span style="font-weight:600; font-size:0.9rem;">Filter:</span>
        <button onclick="applyFilter('all')" class="filter-btn active" id="btn-all">All</button>
        <button onclick="applyFilter('correct')" class="filter-btn" id="btn-correct">✓ Correct</button>
        <button onclick="applyFilter('wrong')" class="filter-btn" id="btn-wrong">✗ Wrong</button>
        <button onclick="applyFilter('skipped')" class="filter-btn" id="btn-skipped">⊗ Skipped</button>
    </div>

    <div id="review-list"></div>
</div>

<script>
    // --- Text Formatting ---
    function formatText(text) {
        if (!text) return "";
        let formatted = String(text);

        if (formatted.includes('<table')) {
            formatted = formatted.replace(/<table/g, '<div class="table-wrapper"><table class="rendered-table"');
            formatted = formatted.replace(/<\/table>/g, '</table></div>');
        }

        formatted = formatted.replace(/<img/g, '<img class="review-img"');
        formatted = formatted.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

        return formatted;
    }

    // --- Filter Logic ---
    function applyFilter(type) {
        const cards = document.querySelectorAll('.review-card');
        const btns = document.querySelectorAll('.filter-btn');
        
        btns.forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + type).classList.add('active');

        cards.forEach(card => {
            const status = card.getAttribute('data-status');
            if (type === 'all') card.style.display = 'block';
            else if (type === 'skipped') card.style.display = (status === 'skipped' || status === 'unvisited') ? 'block' : 'none';
            else card.style.display = (status === type) ? 'block' : 'none';
        });
    }

    // --- PDF Export ---
    function exportPDF() {
        const element = document.querySelector('.container');
        const opt = {
            margin: 10,
            filename: `${document.getElementById('test-display-name').innerText}_Results.pdf`,
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, useCORS: true },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        // Hide filter and action buttons temporarily
        const filterSection = document.querySelector('.filter-section');
        const actionButtons = document.querySelector('.action-buttons');
        filterSection.style.display = 'none';
        actionButtons.style.display = 'none';

        html2pdf().set(opt).from(element).save().then(() => {
            filterSection.style.display = 'flex';
            actionButtons.style.display = 'flex';
        });
    }

    // --- Print ---
    function printResults() {
        const filterSection = document.querySelector('.filter-section');
        const actionButtons = document.querySelector('.action-buttons');
        filterSection.style.display = 'none';
        actionButtons.style.display = 'none';
        window.print();
        setTimeout(() => {
            filterSection.style.display = 'flex';
            actionButtons.style.display = 'flex';
        }, 100);
    }

    // --- Load Results ---
    function loadResults() {
        const questions = JSON.parse(localStorage.getItem('last_questions') || "[]");
        const userAnswers = JSON.parse(localStorage.getItem('last_answers') || "[]");
        const testStatus = JSON.parse(localStorage.getItem('last_status') || "[]");
        const meta = JSON.parse(localStorage.getItem('test_meta') || "{}");

        if (!questions.length) {
            document.body.innerHTML = '<div style="text-align:center; padding:100px 20px;"><h2>No test data found.</h2><button onclick="window.location.href=\'index.html\'" class="action-btn">Go to Dashboard</button></div>';
            return;
        }

        document.getElementById('test-display-name').innerText = meta.name || "Test Result";

        let correctC = 0, wrongC = 0, skipC = 0, unvisC = 0;
        let reviewHtml = "";

        questions.forEach((q, i) => {
            const uAns = userAnswers[i];
            const qStat = testStatus[i];
            
            const isAns = (uAns !== "" && uAns !== null);
            const isCorrect = isAns && (uAns === q.correct);
            
            let status = "";
            if (qStat === 0) { status = "unvisited"; unvisC++; }
            else if (!isAns) { status = "skipped"; skipC++; }
            else if (isCorrect) { status = "correct"; correctC++; }
            else { status = "wrong"; wrongC++; }

            let cardBorder = (status === "correct") ? "correct-border" : (status === "wrong" ? "wrong-border" : "skipped-border");
            let badgeCol = (status === "correct") ? "var(--success)" : (status === "wrong" ? "var(--danger)" : "var(--warning)");
            if (status === "unvisited") badgeCol = "#6c757d";

            // Option rendering WITHOUT letter labels (a, b, c, d)
            let optionsHtml = q.options.map((opt, idx) => {
                const char = String.fromCharCode(97 + idx);
                let cls = "opt";
                let lbl = "";
                if (char === q.correct) { cls += " opt-correct"; lbl = "✔ CORRECT"; }
                else if (char === uAns) { cls += " opt-wrong"; lbl = "✘ YOUR ANSWER"; }
                return `<div class="${cls}"><div>${formatText(opt)}</div> <span style="font-size:0.75rem; font-weight:500;">${lbl}</span></div>`;
            }).join('');

            reviewHtml += `
                <div class="review-card ${cardBorder}" data-status="${status}">
                    <span class="badge" style="background:${badgeCol}">${status.toUpperCase()}</span>
                    <div class="q-text">Q${i+1}: ${formatText(q.question)}</div>
                    <div>${optionsHtml}</div>
                    <div class="explanation-box">
                        <strong style="color:var(--primary); display:block; margin-bottom:8px;">Explanation:</strong>
                        ${formatText(q.explanation || "No explanation available.")}
                    </div>
                </div>`;
        });

        // Scoring
        const p = parseFloat(meta.pos) || 1;
        const n = parseFloat(meta.neg) || 0;
        const score = (correctC * p) - (wrongC * n);

        // Update UI
        document.getElementById('final-score').innerText = score.toFixed(2);
        document.getElementById('marks-info').innerText = `Correct: +${p} | Wrong: -${n}`;
        document.getElementById('stat-correct').innerText = correctC;
        document.getElementById('stat-wrong').innerText = wrongC;
        document.getElementById('stat-skipped').innerText = skipC;
        document.getElementById('stat-unvisit').innerText = unvisC;
        
        const reviewList = document.getElementById('review-list');
        reviewList.innerHTML = reviewHtml;

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise([reviewList]).catch((err) => console.log('MathJax error:', err));
        }
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    window.onload = loadResults;
</script>
</body>
</html>
